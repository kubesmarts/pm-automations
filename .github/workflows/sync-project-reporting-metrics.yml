name: Sync Project Reporting Metrics

# ---------------------------------------------------------------------------
# Schedule configuration
# NOTE: GitHub Actions does not support variables in cron expressions.
#       To change the schedule update the cron expression below.
#       All times are in UTC.
# ---------------------------------------------------------------------------
on:
  schedule:
    - cron: '0 0 * * *'   # once daily at 00:00 UTC
  workflow_dispatch:

# Requires a PAT with 'project' and 'read:org' scopes stored as secret PSYNC_PAT_GH.
# The default GITHUB_TOKEN does not have write access to organization-level projects.
# JIRA Cloud (Atlassian) uses Basic auth: PSYNC_JIRA_EMAIL (account email) + PSYNC_PAT_JIRA (API token).

jobs:
  track-reporting-date:
    name: Sync project reporting metrics
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PSYNC_PAT_GH }}
      JIRA_API_TOKEN: ${{ secrets.PSYNC_PAT_JIRA }}
      JIRA_EMAIL: ${{ vars.PSYNC_JIRA_EMAIL }}
      JIRA_BASE_URL: ${{ vars.PSYNC_JIRA_BASE_URL }}
      PROJECTS: ${{ vars.PSYNC_PROJECTS }}
    steps:
      - name: Sync project reporting metrics across all configured projects
        id: sync
        run: |
          set -e

          # Clean up JIRA, error, and alert temp files on exit (covers normal completion and errors)
          WORKFLOW_ERRORS_FILE=/tmp/workflow_errors.txt
          WORKFLOW_ALERTS_FILE=/tmp/workflow_alerts.txt
          > "$WORKFLOW_ERRORS_FILE"
          > "$WORKFLOW_ALERTS_FILE"
          trap 'rm -f /tmp/jira_create.json /tmp/jira_issue.json /tmp/jira_resp.json /tmp/jira_wl_list.json /tmp/jira_wl.json "$WORKFLOW_ERRORS_FILE" "$WORKFLOW_ALERTS_FILE"' EXIT

          TODAY=$(date -u +%Y-%m-%d)

          # Atlassian Cloud uses HTTP Basic auth: base64(email:api_token).
          # Computed once here and reused for all JIRA API calls.
          JIRA_AUTH_HEADER="Basic $(printf '%s:%s' "$JIRA_EMAIL" "$JIRA_API_TOKEN" | base64 -w 0)"

          # Convert a GH numeric value (in weeks) to JIRA time format.
          # Convention: 1 week = 5 days = 40 hours.
          # Examples: 2 → "2w", 0.4 → "2d", 0.1 → "4h".
          # Returns empty string if input is empty.
          weeks_to_jira() {
            local val="$1"
            [ -z "$val" ] && echo "" && return
            awk -v v="$val" 'BEGIN {
              h1000 = int(v * 40000 + 0.5)
              if (h1000 % 40000 == 0) {
                printf "%dw\n", h1000 / 40000
              } else if (h1000 % 8000 == 0) {
                printf "%dd\n", h1000 / 8000
              } else {
                printf "%dh\n", int(h1000 / 1000 + 0.5)
              }
            }'
          }

          # Append an error line to the workflow errors file for end-of-run notification.
          # $1 = context label (e.g. project:number or item ref), $2 = error message
          record_error() {
            printf '[%s] %s\n' "$1" "$2" >> "$WORKFLOW_ERRORS_FILE"
          }

          # Append an alert line to the workflow alerts file for assignee notification.
          # Format: project_owner:project_number|issue_number|assignees|alerts|title
          # $1 = project_owner:project_number, $2 = issue_number, $3 = assignees (comma-separated), $4 = alerts, $5 = title
          record_alert() {
            printf '%s|%s|%s|%s|%s\n' "$1" "$2" "$3" "$4" "$5" >> "$WORKFLOW_ALERTS_FILE"
          }

          # Extract a field value from a project item JSON blob by field name.
          # Handles text, number, single-select and date field types.
          get_field() {
            local item_json="$1"
            local field_name="$2"
            echo "$item_json" | jq -r --arg n "$field_name" '
              [ .fieldValues.nodes[] | select(.field.name == $n) ] |
              if length == 0 then ""
              else .[0] |
                if .text != null then .text
                elif .number != null then (.number | tostring)
                elif .["name"] != null then .["name"]
                elif .date != null then .date
                else ""
                end
              end
            '
          }

          # process_items reads one compact JSON item per line from stdin.
          # Reads PROJECT_ID, REPORTING_DATE_FIELD_ID, REPORTING_LOG_FIELD_ID, SYNC_STATUS_FIELD_ID,
          # EXTERNAL_REF_FIELD_ID, ISSUE_STATUS (associative array), TODAY from outer scope.
          # Updates UPDATED_COUNT and SKIPPED_COUNT in outer scope.
          process_items() {
            while IFS= read -r item; do
              ITEM_ID=$(echo "$item" | jq -r '.id')
              IS_ARCHIVED=$(echo "$item" | jq -r '.isArchived')
              ISSUE_NUMBER=$(echo "$item" | jq -r '.content.number // ""')
              ISSUE_TITLE=$(echo "$item" | jq -r '.content.title // ""')
              echo ""
              echo "Item $ITEM_ID${ISSUE_NUMBER:+ (GH #$ISSUE_NUMBER)}"
              [ -z "$ISSUE_NUMBER" ] && echo "  (draft item — no linked GH issue)"
              if [ "$IS_ARCHIVED" = "true" ]; then
                echo "  → Skipping: item is archived."
                SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                continue
              fi

              STATUS=$(get_field         "$item" "Status")
              STATUS_LC=$(echo "$STATUS" | tr '[:upper:]' '[:lower:]')
              PRIORITY=$(get_field       "$item" "Priority")
              ESTIMATE=$(get_field       "$item" "Estimate")
              REMAINING_WORK=$(get_field "$item" "Remaining Work")
              TIME_SPENT=$(get_field     "$item" "Time Spent")
              AREA=$(get_field           "$item" "Area")
              VERSION=$(get_field        "$item" "Version")
              REPORTING_LOG=$(get_field  "$item" "Reporting Log")

              # Parse tracked field values from the latest (first) entry in the log.
              # Log format: ENTRY1 | ENTRY2 | ... where each entry is DATE, AREA, STATUS, PRIORITY, VERSION, ESTIMATE, REMAINING_WORK, TIME_SPENT
              if [ -z "$REPORTING_LOG" ]; then
                LAST_AREA="" LAST_STATUS="" LAST_PRIORITY="" LAST_VERSION=""
                LAST_ESTIMATE="" LAST_REMAINING_WORK="" LAST_TIME_SPENT=""
              else
                LAST_ENTRY=$(echo "$REPORTING_LOG" | sed 's/ | /\n/g' | head -1)
                LAST_AREA=$(echo           "$LAST_ENTRY" | cut -d',' -f2 | xargs)
                LAST_STATUS=$(echo         "$LAST_ENTRY" | cut -d',' -f3 | xargs)
                LAST_PRIORITY=$(echo       "$LAST_ENTRY" | cut -d',' -f4 | xargs)
                LAST_VERSION=$(echo        "$LAST_ENTRY" | cut -d',' -f5 | xargs)
                LAST_ESTIMATE=$(echo       "$LAST_ENTRY" | cut -d',' -f6 | xargs)
                LAST_REMAINING_WORK=$(echo "$LAST_ENTRY" | cut -d',' -f7 | xargs)
                LAST_TIME_SPENT=$(echo     "$LAST_ENTRY" | cut -d',' -f8 | xargs)
              fi

              echo "  Current : $AREA, $STATUS, $PRIORITY, $VERSION, $ESTIMATE, $REMAINING_WORK, $TIME_SPENT"
              echo "  Last log: $LAST_AREA, $LAST_STATUS, $LAST_PRIORITY, $LAST_VERSION, $LAST_ESTIMATE, $LAST_REMAINING_WORK, $LAST_TIME_SPENT"

              # Read External Reference early — needed both for CREATE handling and JIRA sync
              EXTERNAL_REF=$(get_field "$item" "External Reference")

              # Compute Alerts codes (validation rules, always evaluated regardless of changes)
              SYNC_STATUS_CODES=""

              # Handle JIRA ticket creation if External Reference is a CREATE directive.
              # Pattern: "CREATE <projectKey> [<component>]"  e.g. "CREATE QUARKUS quarkus-flow"
              # On success: EXTERNAL_REF is set to the new JIRA key and LAST_STATUS is cleared
              #             to force the change-detected path so JIRA sync runs immediately.
              # On failure: JIRA_CREATE_ERROR is added to Alerts and EXTERNAL_REF is cleared.
              if echo "$EXTERNAL_REF" | grep -qE '^CREATE[[:space:]]+[A-Za-z0-9_]+'; then
                CREATE_PROJECT_KEY=$(echo "$EXTERNAL_REF" | awk '{print $2}')
                CREATE_COMPONENT=$(echo "$EXTERNAL_REF" | awk 'NF>2{$1=$2=""; sub(/^[[:space:]]+/,""); print}' | xargs)
                echo "  → CREATE directive: project=$CREATE_PROJECT_KEY component=${CREATE_COMPONENT:-none}"
                if [ -z "$ISSUE_NUMBER" ]; then
                  echo "  → Cannot create JIRA ticket: item is not linked to a GH issue."
                  SYNC_STATUS_CODES="JIRA_CREATE_ERROR NO_ISSUE"
                  EXTERNAL_REF=""
                elif [ -z "$EXTERNAL_REF_FIELD_ID" ]; then
                  echo "  → Cannot create JIRA ticket: 'External Reference' field not configured in project."
                  SYNC_STATUS_CODES="JIRA_CREATE_ERROR NO_EXT_REF_FIELD"
                  EXTERNAL_REF=""
                else
                  GH_ISSUE_URL=$(echo "$item" | jq -r '.content.url // ""')
                  JIRA_CREATE_PAYLOAD=$(jq -n \
                    --arg project "$CREATE_PROJECT_KEY" \
                    --arg summary "$ISSUE_TITLE" \
                    --arg desc    "Details at $GH_ISSUE_URL" \
                    --arg label   "gh-issue-${ISSUE_NUMBER}" \
                    --arg comp    "$CREATE_COMPONENT" \
                    '{
                      fields: ({
                        project:     {key: $project},
                        summary:     $summary,
                        description: $desc,
                        issuetype:   {name: "Story"},
                        labels:      [$label]
                      } + (if $comp != "" then {components: [{name: $comp}]} else {} end))
                    }')
                  set +e
                  JIRA_CREATE_HTTP=$(curl -s --max-time 30 -o /tmp/jira_create.json -w "%{http_code}" \
                    -H "Authorization: ${JIRA_AUTH_HEADER}" \
                    -H "Content-Type: application/json" \
                    -X POST \
                    -d "$JIRA_CREATE_PAYLOAD" \
                    "${JIRA_BASE_URL}/rest/api/2/issue")
                  set -e
                  JIRA_CREATE_HTTP="${JIRA_CREATE_HTTP:-000}"
                  if [ "$JIRA_CREATE_HTTP" -ge 200 ] && [ "$JIRA_CREATE_HTTP" -lt 300 ]; then
                    NEW_JIRA_KEY=$(jq -r '.key' /tmp/jira_create.json)
                    echo "  → JIRA ticket $NEW_JIRA_KEY created (HTTP $JIRA_CREATE_HTTP)."
                    gh api graphql -f query='
                      mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $text: String!) {
                        updateProjectV2ItemFieldValue(input: {
                          projectId: $projectId
                          itemId: $itemId
                          fieldId: $fieldId
                          value: { text: $text }
                        }) { projectV2Item { id } }
                      }
                    ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
                      -f fieldId="$EXTERNAL_REF_FIELD_ID" -f text="$NEW_JIRA_KEY" > /dev/null
                    echo "  → External Reference updated to $NEW_JIRA_KEY."
                    EXTERNAL_REF="$NEW_JIRA_KEY"
                    # Force the change-detected path so JIRA sync runs immediately after creation
                    LAST_STATUS=""
                  else
                    echo "  → Warning: Failed to create JIRA ticket (HTTP $JIRA_CREATE_HTTP)"
                    echo "  → JIRA error response:" && cat /tmp/jira_create.json
                    SYNC_STATUS_CODES="JIRA_CREATE_ERROR HTTP_${JIRA_CREATE_HTTP}"
                    EXTERNAL_REF=""
                  fi
                fi
              fi
              if [ -n "$ESTIMATE_FIELD_ID" ] && [ -n "$STATUS_LC" ] && [ "$STATUS_LC" != "backlog" ] && [ "$STATUS_LC" != "next" ] && [ -z "$ESTIMATE" ]; then
                SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }NO_ESTIMATE"
              fi
              if [ -n "$REMAINING_WORK_FIELD_ID" ] && [ -n "$STATUS_LC" ] && [ "$STATUS_LC" != "backlog" ] && [ "$STATUS_LC" != "next" ] && [ "$STATUS_LC" != "done" ] && [ -z "$REMAINING_WORK" ]; then
                SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }NO_REMAINING_WORK"
              fi
              if [ -n "$AREA_FIELD_ID" ] && [ -n "$STATUS_LC" ] && [ "$STATUS_LC" != "backlog" ] && [ -z "$AREA" ]; then
                SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }NO_AREA"
              fi
              if [ -n "$PRIORITY_FIELD_ID" ] && [ -n "$STATUS_LC" ] && [ "$STATUS_LC" != "backlog" ] && [ -z "$PRIORITY" ]; then
                SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }NO_PRIORITY"
              fi
              if [ -n "$VERSION_FIELD_ID" ] && [ -n "$STATUS_LC" ] && [ "$STATUS_LC" != "backlog" ] && [ -z "$VERSION" ]; then
                SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }NO_VERSION"
              fi
              if [ -n "$TIME_SPENT_FIELD_ID" ] && [ "$STATUS_LC" = "done" ] && [ -z "$TIME_SPENT" ]; then
                SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }NO_TIME_SPENT"
              fi
              # Auto-clear Remaining Work for any Done item that still has a value (zero or non-zero).
              if [ "$STATUS_LC" = "done" ] && [ -n "$REMAINING_WORK" ] && [ -n "$REMAINING_WORK_FIELD_ID" ]; then
                gh api graphql -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!) {
                    clearProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                    }) { projectV2Item { id } }
                  }
                ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
                  -f fieldId="$REMAINING_WORK_FIELD_ID" > /dev/null
                echo "  → Remaining Work auto-cleared (issue is Done)."
                REMAINING_WORK=""
              fi
              HAS_ASSIGNEE=$(echo "$item" | jq -r '(.content.assignees.nodes // [] | length) > 0')
              if { [ "$STATUS_LC" = "in progress" ] || [ "$STATUS_LC" = "in review" ] || [ "$STATUS_LC" = "done" ]; } && \
                 [ "$HAS_ASSIGNEE" != "true" ]; then
                SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }NO_ASSIGNEE"
              fi

              # Check CHILDREN_STATUS: detect parent/child status inconsistencies.
              # Only runs when the item is linked to a GH issue with sub-issues in this project.
              if [ -n "$ISSUE_NUMBER" ]; then
                SUB_NUMBERS=$(echo "$item" | jq -r '.content.subIssues.nodes[].number // empty' 2>/dev/null || true)
                if [ -n "$SUB_NUMBERS" ]; then
                  MISMATCH=false
                  while IFS= read -r child_num; do
                    [ -z "$child_num" ] && continue
                    CHILD_STATUS="${ISSUE_STATUS[$child_num]:-}"
                    [ -z "$CHILD_STATUS" ] && continue  # child not in this project, skip
                    CHILD_STATUS_LC=$(echo "$CHILD_STATUS" | tr '[:upper:]' '[:lower:]')
                    # Condition 1: parent Done but child not Done
                    if [ "$STATUS_LC" = "done" ] && [ "$CHILD_STATUS_LC" != "done" ]; then
                      MISMATCH=true
                    fi
                    # Condition 2: parent not Backlog/Next but child is Backlog
                    if [ "$STATUS_LC" != "backlog" ] && [ "$STATUS_LC" != "next" ] && [ "$CHILD_STATUS_LC" = "backlog" ]; then
                      MISMATCH=true
                    fi
                  done <<< "$SUB_NUMBERS"
                  if [ "$MISMATCH" = "true" ]; then
                    SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }CHILDREN_STATUS"
                  fi
                fi
              fi

              # Skip if nothing has changed; still write Alerts to reflect current validation results
              if [ "$AREA"           = "$LAST_AREA"           ] && \
                 [ "$STATUS"         = "$LAST_STATUS"         ] && \
                 [ "$PRIORITY"        = "$LAST_PRIORITY"        ] && \
                 [ "$VERSION"         = "$LAST_VERSION"         ] && \
                 [ "$ESTIMATE"        = "$LAST_ESTIMATE"        ] && \
                 [ "$REMAINING_WORK"  = "$LAST_REMAINING_WORK"  ] && \
                 [ "$TIME_SPENT"      = "$LAST_TIME_SPENT"      ]; then
                echo "  → No change detected. Skipping."
                SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                if [ -n "$SYNC_STATUS_FIELD_ID" ]; then
                  echo "  → Alerts: ${SYNC_STATUS_CODES:-none}"
                  gh api graphql -f query='
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $text: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { text: $text }
                      }) { projectV2Item { id } }
                    }
                  ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
                    -f fieldId="$SYNC_STATUS_FIELD_ID" -f text="$SYNC_STATUS_CODES" > /dev/null
                fi
                if echo "$SYNC_STATUS_CODES" | grep -qE 'JIRA_SYNC_ERROR|JIRA_CREATE_ERROR|JIRA_ENDPOINT_ERROR'; then
                  record_error "${PROJECT_OWNER}:${PROJECT_NUMBER}" "$SYNC_STATUS_CODES"
                fi || true

                # Collect validation alerts for skipped items too
                if [ -n "$SYNC_STATUS_CODES" ] && [ -n "$ISSUE_NUMBER" ]; then
                  VALIDATION_ALERTS=$(echo "$SYNC_STATUS_CODES" | sed -E 's/(JIRA_SYNC_ERROR[^,]*|JIRA_CREATE_ERROR[^,]*|JIRA_ENDPOINT_ERROR[^,]*),?\s*//g' | sed 's/^[, ]*//;s/[, ]*$//')
                  if [ -n "$VALIDATION_ALERTS" ]; then
                    ASSIGNEES_LIST=$(echo "$item" | jq -r '[.content.assignees.nodes[].login] | join(",")' 2>/dev/null || echo "")
                    if [ -n "$ASSIGNEES_LIST" ]; then
                      record_alert "${PROJECT_OWNER}:${PROJECT_NUMBER}" "$ISSUE_NUMBER" "$ASSIGNEES_LIST" "$VALIDATION_ALERTS" "$ISSUE_TITLE"
                    fi
                  fi
                fi
                continue
              fi

              echo "  → Change detected. Updating 'Reporting Date' and prepending to 'Reporting Log'."

              # Build new entry: DATE, AREA, STATUS, PRIORITY, ESTIMATE, REMAINING_WORK, TIME_SPENT
              NEW_ENTRY="${TODAY}, ${AREA}, ${STATUS}, ${PRIORITY}, ${VERSION}, ${ESTIMATE}, ${REMAINING_WORK}, ${TIME_SPENT}"

              # Prepend new entry and keep at most 5 entries total (discard oldest)
              if [ -z "$REPORTING_LOG" ]; then
                NEW_LOG="$NEW_ENTRY"
              else
                TRIMMED=$(echo "$REPORTING_LOG" | sed 's/ | /\n/g' | head -4 | paste -sd'~' | sed 's/~/ | /g')
                NEW_LOG="${NEW_ENTRY} | ${TRIMMED}"
              fi

              # Update 'Reporting Date' to today
              gh api graphql -f query='
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { date: $date }
                  }) { projectV2Item { id } }
                }
              ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
                -f fieldId="$REPORTING_DATE_FIELD_ID" -f date="$TODAY" > /dev/null

              # Append new entry to 'Reporting Log'
              gh api graphql -f query='
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $text: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { text: $text }
                  }) { projectV2Item { id } }
                }
              ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
                -f fieldId="$REPORTING_LOG_FIELD_ID" -f text="$NEW_LOG" > /dev/null

              # Sync to JIRA if an External Reference is set
              if [ -n "$EXTERNAL_REF" ]; then
                JIRA_ISSUE_URL="${JIRA_BASE_URL}/rest/api/2/issue/${EXTERNAL_REF}"

                # Fetch JIRA issue upfront to verify sync conditions before making any changes
                set +e
                JIRA_GET_STATUS=$(curl -s --max-time 30 -o /tmp/jira_issue.json -w "%{http_code}" \
                  -H "Authorization: ${JIRA_AUTH_HEADER}" \
                  "${JIRA_ISSUE_URL}")
                set -e
                JIRA_GET_STATUS="${JIRA_GET_STATUS:-000}"

                if [ "$JIRA_GET_STATUS" -eq 404 ]; then
                  # A real "ticket not found" returns a JIRA JSON body with errorMessages.
                  # A 404 from a misconfigured or unreachable endpoint returns no such body.
                  JIRA_ERROR_MSG=$(jq -r '.errorMessages[0] // ""' /tmp/jira_issue.json 2>/dev/null || true)
                  if [ -n "$JIRA_ERROR_MSG" ]; then
                    echo "  → Warning: JIRA issue $EXTERNAL_REF not found (HTTP 404). Skipping JIRA sync."
                    SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }JIRA_NOT_FOUND"
                  else
                    echo "  → Warning: JIRA endpoint not reachable or misconfigured (HTTP 404, no JIRA error body). Check PSYNC_JIRA_BASE_URL."
                    echo "  → JIRA error response:" && cat /tmp/jira_issue.json
                    SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }JIRA_ENDPOINT_ERROR HTTP_404"
                  fi
                elif [ "$JIRA_GET_STATUS" -lt 200 ] || [ "$JIRA_GET_STATUS" -ge 300 ]; then
                  echo "  → Warning: Failed to fetch JIRA issue $EXTERNAL_REF (HTTP $JIRA_GET_STATUS). Skipping JIRA sync."
                  echo "  → JIRA error response:" && cat /tmp/jira_issue.json
                  SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }JIRA_SYNC_ERROR HTTP_${JIRA_GET_STATUS}"
                else
                  EXPECTED_LABEL="gh-issue-${ISSUE_NUMBER}"
                  JIRA_HAS_LABEL=$(jq -r --arg lbl "$EXPECTED_LABEL" '[.fields.labels[]] | any(. == $lbl)' /tmp/jira_issue.json)

                  if [ "$JIRA_HAS_LABEL" != "true" ]; then
                    JIRA_LABELS=$(jq -r '[.fields.labels[]] | join(", ")' /tmp/jira_issue.json)
                    echo "  → Skipping JIRA sync: ticket $EXTERNAL_REF does not have the '${EXPECTED_LABEL}' label (current labels: ${JIRA_LABELS:-none})."
                    SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }JIRA_SYNC_NOT_ALLOWED"
                  else
                    echo "  → Syncing to JIRA ticket: $EXTERNAL_REF"

                    # Convert GH week-based values to JIRA time format (e.g. 2→"2w", 0.4→"2d", 0.1→"4h")
                    JIRA_ESTIMATE=$(weeks_to_jira "$ESTIMATE")
                    JIRA_REMAINING=$(weeks_to_jira "$REMAINING_WORK")
                    # Done items always have empty Remaining Work; explicitly zero out JIRA's estimate
                    [ "$STATUS_LC" = "done" ] && [ -z "$JIRA_REMAINING" ] && JIRA_REMAINING="0h"
                    JIRA_TIME_SPENT=$(weeks_to_jira "$TIME_SPENT")

                    # Compute area label: lowercase area value prefixed with "area/", or empty string
                    AREA_LABEL=""
                    if [ -n "$AREA" ]; then
                      AREA_LABEL="area/$(echo "$AREA" | tr '[:upper:]' '[:lower:]')"
                    fi

                    # Build new labels array: remove any existing area/* label, then add new one (if set)
                    NEW_LABELS=$(jq -r --arg lbl "$AREA_LABEL" \
                      '[.fields.labels[] | select(test("^area/") | not)] +
                       (if $lbl != "" then [$lbl] else [] end)' \
                      /tmp/jira_issue.json)

                    echo "  → JIRA values: priority=$PRIORITY, estimate=$JIRA_ESTIMATE, remaining=$JIRA_REMAINING, timeSpent=$JIRA_TIME_SPENT, areaLabel=${AREA_LABEL:-none}"

                    # Build update payload: priority + time tracking + area label
                    JIRA_PAYLOAD=$(jq -n \
                      --arg priority       "$PRIORITY" \
                      --arg estimate       "$JIRA_ESTIMATE" \
                      --arg remainingWork  "$JIRA_REMAINING" \
                      --argjson labels     "$NEW_LABELS" \
                      '{
                        fields: {
                          priority:     {name: $priority},
                          timetracking: {originalEstimate: $estimate, remainingEstimate: $remainingWork},
                          labels:       $labels
                        }
                      }')

                    set +e
                    HTTP_STATUS=$(curl -s --max-time 30 -o /tmp/jira_resp.json -w "%{http_code}" \
                      -H "Authorization: ${JIRA_AUTH_HEADER}" \
                      -X PUT \
                      -H "Content-Type: application/json" \
                      -d "$JIRA_PAYLOAD" \
                      "$JIRA_ISSUE_URL")
                    set -e
                    HTTP_STATUS="${HTTP_STATUS:-000}"

                    if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
                      echo "  → JIRA $EXTERNAL_REF updated (HTTP $HTTP_STATUS)"
                    else
                      echo "  → Warning: JIRA update failed for $EXTERNAL_REF (HTTP $HTTP_STATUS)"
                      echo "  → JIRA error response:" && cat /tmp/jira_resp.json
                      SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }JIRA_SYNC_ERROR HTTP_${HTTP_STATUS}"
                    fi

                    # Sync Time Spent:
                    # 1. Try to find and PUT-update the workflow-managed worklog in place.
                    # 2. If editing is not permitted, fall back to the delta approach:
                    #    GET JIRA issue timespent, compute GH - JIRA, POST a new worklog for the difference.
                    # GH stores time in weeks (1w = 5d = 40h); JIRA stores timespent in seconds.
                    if [ -n "$JIRA_TIME_SPENT" ]; then
                      # Build worklog comments referencing the GH issue number when available
                      if [ -n "$ISSUE_NUMBER" ]; then
                        WL_COPY_COMMENT="Copied time spent from GH #${ISSUE_NUMBER}"
                        WL_DELTA_COMMENT="Increased time spent from GH #${ISSUE_NUMBER}"
                      else
                        WL_COPY_COMMENT="Copied time spent from GH project item"
                        WL_DELTA_COMMENT="Increased time spent from GH project item"
                      fi
                      TIME_SPENT_SYNCED=false

                      # Step 1: look for the managed worklog (identified by the copy comment or the legacy
                      # comment from earlier workflow versions) and try to update it in place.
                      set +e
                      WL_LIST_STATUS=$(curl -s --max-time 30 -o /tmp/jira_wl_list.json -w "%{http_code}" \
                        -H "Authorization: ${JIRA_AUTH_HEADER}" \
                        "${JIRA_ISSUE_URL}/worklog")
                      set -e
                      WL_LIST_STATUS="${WL_LIST_STATUS:-000}"
                      echo "  → GET worklogs HTTP $WL_LIST_STATUS"

                      if [ "$WL_LIST_STATUS" -ge 200 ] && [ "$WL_LIST_STATUS" -lt 300 ]; then
                        MANAGED_WL_ID=$(jq -r --arg c "$WL_COPY_COMMENT" \
                          '.worklogs[] | select(.comment == $c or .comment == "[managed by track-reporting-date workflow]") | .id' \
                          /tmp/jira_wl_list.json | head -1)

                        if [ -n "$MANAGED_WL_ID" ]; then
                          WL_PAYLOAD=$(jq -n --arg ts "$JIRA_TIME_SPENT" --arg c "$WL_COPY_COMMENT" \
                            '{timeSpent: $ts, comment: $c}')
                          set +e
                          WL_STATUS=$(curl -s --max-time 30 -o /tmp/jira_wl.json -w "%{http_code}" \
                            -H "Authorization: ${JIRA_AUTH_HEADER}" \
                            -X PUT \
                            -H "Content-Type: application/json" \
                            -d "$WL_PAYLOAD" \
                            "${JIRA_ISSUE_URL}/worklog/${MANAGED_WL_ID}?adjustEstimate=leave")
                          set -e
                          WL_STATUS="${WL_STATUS:-000}"
                          if [ "$WL_STATUS" -ge 200 ] && [ "$WL_STATUS" -lt 300 ]; then
                            echo "  → Time Spent updated to $JIRA_TIME_SPENT on managed worklog $MANAGED_WL_ID (HTTP $WL_STATUS)."
                            TIME_SPENT_SYNCED=true
                          else
                            echo "  → Cannot edit managed worklog $MANAGED_WL_ID (HTTP $WL_STATUS). Falling back to delta sync."
                          fi
                        fi
                      fi

                      # Step 2 (fallback): use the already-fetched issue data to get timespent,
                      # compute delta, POST a new worklog for the difference.
                      # Also used when no managed worklog exists yet (first sync → posts with copy comment).
                      if [ "$TIME_SPENT_SYNCED" = "false" ]; then
                        JIRA_TIMESPENT_SECS=$(jq -r '.fields.timespent // 0' /tmp/jira_issue.json)
                        echo "  → JIRA timespent: ${JIRA_TIMESPENT_SECS}s, GH Time Spent: ${TIME_SPENT}w"

                        # Compute delta in hours using integer arithmetic (×1000 to avoid float issues).
                        # GH weeks × 40000 = GH hours × 1000.
                        # JIRA seconds × 1000 / 3600 = JIRA hours × 1000.
                        # Output: "Xh" if GH > JIRA, empty if delta ≤ 0.
                        DELTA_JIRA=$(awk -v gh="$TIME_SPENT" -v jira_s="$JIRA_TIMESPENT_SECS" 'BEGIN {
                          gh_h1000   = int(gh * 40000 + 0.5)
                          jira_h1000 = int(jira_s * 1000 / 3600 + 0.5)
                          delta = gh_h1000 - jira_h1000
                          if (delta > 0) printf "%dh\n", int(delta / 1000 + 0.5)
                        }')

                        if [ -n "$DELTA_JIRA" ]; then
                          # First sync (no prior worklogs) → copy comment; otherwise → delta comment
                          if [ "$JIRA_TIMESPENT_SECS" = "0" ]; then
                            WL_COMMENT="$WL_COPY_COMMENT"
                          else
                            WL_COMMENT="$WL_DELTA_COMMENT"
                          fi
                          echo "  → Logging worklog: $DELTA_JIRA ($WL_COMMENT)"
                          WL_PAYLOAD=$(jq -n --arg ts "$DELTA_JIRA" --arg c "$WL_COMMENT" \
                            '{timeSpent: $ts, comment: $c}')
                          set +e
                          WL_STATUS=$(curl -s --max-time 30 -o /tmp/jira_wl.json -w "%{http_code}" \
                            -H "Authorization: ${JIRA_AUTH_HEADER}" \
                            -X POST \
                            -H "Content-Type: application/json" \
                            -d "$WL_PAYLOAD" \
                            "${JIRA_ISSUE_URL}/worklog?adjustEstimate=leave")
                          set -e
                          WL_STATUS="${WL_STATUS:-000}"
                          if [ "$WL_STATUS" -ge 200 ] && [ "$WL_STATUS" -lt 300 ]; then
                            echo "  → $DELTA_JIRA logged (HTTP $WL_STATUS). JIRA total now ~${JIRA_TIME_SPENT}."
                          else
                            echo "  → Warning: Failed to log Time Spent worklog (HTTP $WL_STATUS)"
                            echo "  → JIRA error response:" && cat /tmp/jira_wl.json
                            SYNC_STATUS_CODES="${SYNC_STATUS_CODES:+${SYNC_STATUS_CODES}, }JIRA_SYNC_ERROR WORKLOG_HTTP_${WL_STATUS}"
                          fi
                        else
                          echo "  → Time Spent already up to date in JIRA (delta ≤ 0). Skipping."
                        fi
                      fi
                    fi
                  fi
                fi
              fi

              echo "  → Done."
              UPDATED_COUNT=$((UPDATED_COUNT + 1))

              # Write Alerts field (reflects validation violations and JIRA sync results)
              if [ -n "$SYNC_STATUS_FIELD_ID" ]; then
                echo "  → Alerts: ${SYNC_STATUS_CODES:-none}"
                gh api graphql -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $text: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { text: $text }
                    }) { projectV2Item { id } }
                  }
                ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
                  -f fieldId="$SYNC_STATUS_FIELD_ID" -f text="$SYNC_STATUS_CODES" > /dev/null
              fi
              if echo "$SYNC_STATUS_CODES" | grep -qE 'JIRA_SYNC_ERROR|JIRA_CREATE_ERROR|JIRA_ENDPOINT_ERROR'; then
                record_error "${PROJECT_OWNER}:${PROJECT_NUMBER}" "$SYNC_STATUS_CODES"
              fi || true

              # Collect validation alerts (non-JIRA errors) for assignee notification
              # Only record if: has alerts, has issue number, has assignees, and alerts are not just JIRA errors
              if [ -n "$SYNC_STATUS_CODES" ] && [ -n "$ISSUE_NUMBER" ]; then
                # Filter out JIRA-only errors - we want validation alerts
                VALIDATION_ALERTS=$(echo "$SYNC_STATUS_CODES" | sed -E 's/(JIRA_SYNC_ERROR[^,]*|JIRA_CREATE_ERROR[^,]*|JIRA_ENDPOINT_ERROR[^,]*),?\s*//g' | sed 's/^[, ]*//;s/[, ]*$//')
                if [ -n "$VALIDATION_ALERTS" ]; then
                  ASSIGNEES_LIST=$(echo "$item" | jq -r '[.content.assignees.nodes[].login] | join(",")' 2>/dev/null || echo "")
                  if [ -n "$ASSIGNEES_LIST" ]; then
                    record_alert "${PROJECT_OWNER}:${PROJECT_NUMBER}" "$ISSUE_NUMBER" "$ASSIGNEES_LIST" "$VALIDATION_ALERTS" "$ISSUE_TITLE"
                  fi
                fi
              fi

            done
          }

          # ---------------------------------------------------------------------------
          # Iterate over all configured projects
          # PROJECTS variable format: space-separated "owner:project_number" entries
          # e.g. "dgutierr-org:1 another-org:3"
          # ---------------------------------------------------------------------------
          TOTAL_UPDATED=0
          TOTAL_SKIPPED=0

          for PROJECT_ENTRY in $PROJECTS; do
            PROJECT_OWNER="${PROJECT_ENTRY%%:*}"
            PROJECT_NUMBER="${PROJECT_ENTRY##*:}"

            echo ""
            echo "========================================"
            echo "Project: $PROJECT_OWNER #$PROJECT_NUMBER"
            echo "========================================"

            # Fetch project metadata and first page of items (100 per page)
            echo "Fetching project metadata and page 1..."
            PAGE_RESPONSE=$(gh api graphql -f query='
              query($owner: String!, $number: Int!) {
                organization(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 30) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                        }
                      }
                    }
                    items(first: 100) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        isArchived
                        content {
                          ... on Issue {
                            number
                            title
                            url
                            assignees(first: 5) { nodes { login } }
                            subIssues(first: 50) { nodes { number } }
                          }
                          ... on PullRequest {
                            number
                            title
                            url
                            assignees(first: 5) { nodes { login } }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldTextValue {
                              text
                              field { ... on ProjectV2Field { name } }
                            }
                            ... on ProjectV2ItemFieldNumberValue {
                              number
                              field { ... on ProjectV2Field { name } }
                            }
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field { ... on ProjectV2SingleSelectField { name } }
                            }
                            ... on ProjectV2ItemFieldDateValue {
                              date
                              field { ... on ProjectV2Field { name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            ' -f owner="$PROJECT_OWNER" -F number=$PROJECT_NUMBER)

            # Check for GraphQL-level errors (HTTP 200 but with error payload)
            GRAPHQL_ERRORS=$(echo "$PAGE_RESPONSE" | jq -r '.errors // empty')
            if [ -n "$GRAPHQL_ERRORS" ]; then
              echo "Error: GraphQL query failed for $PROJECT_OWNER #$PROJECT_NUMBER:"
              echo "$GRAPHQL_ERRORS"
              record_error "${PROJECT_OWNER}:${PROJECT_NUMBER}" "GraphQL query failed: $GRAPHQL_ERRORS"
              continue
            fi

            PROJECT_ID=$(echo "$PAGE_RESPONSE" | jq -r '.data.organization.projectV2.id // ""')
            if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
              echo "Error: Could not resolve project ID for $PROJECT_OWNER #$PROJECT_NUMBER. Check org name and project number. Skipping."
              record_error "${PROJECT_OWNER}:${PROJECT_NUMBER}" "Could not resolve project ID — check org name and project number"
              continue
            fi

            REPORTING_DATE_FIELD_ID=$(echo "$PAGE_RESPONSE"  | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Reporting Date")    | .id')
            REPORTING_LOG_FIELD_ID=$(echo "$PAGE_RESPONSE"  | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Reporting Log")     | .id')
            SYNC_STATUS_FIELD_ID=$(echo "$PAGE_RESPONSE"    | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Alerts")             | .id')
            EXTERNAL_REF_FIELD_ID=$(echo "$PAGE_RESPONSE"  | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "External Reference") | .id')
            AREA_FIELD_ID=$(echo "$PAGE_RESPONSE"           | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Area")              | .id')
            PRIORITY_FIELD_ID=$(echo "$PAGE_RESPONSE"       | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Priority")          | .id')
            ESTIMATE_FIELD_ID=$(echo "$PAGE_RESPONSE"       | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Estimate")          | .id')
            REMAINING_WORK_FIELD_ID=$(echo "$PAGE_RESPONSE" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Remaining Work")     | .id')
            TIME_SPENT_FIELD_ID=$(echo "$PAGE_RESPONSE"     | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Time Spent")        | .id')
            VERSION_FIELD_ID=$(echo "$PAGE_RESPONSE"        | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Version")            | .id')
            
            # Check for Σ (sigma) aggregated fields
            SIGMA_ESTIMATE_FIELD_ID=$(echo "$PAGE_RESPONSE"       | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Σ Estimate")          | .id')
            SIGMA_REMAINING_FIELD_ID=$(echo "$PAGE_RESPONSE"      | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Σ Remaining Work")    | .id')
            SIGMA_SPENT_FIELD_ID=$(echo "$PAGE_RESPONSE"          | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Σ Time Spent")        | .id')

            if [ -z "$REPORTING_DATE_FIELD_ID" ]; then
              echo "Error: 'Reporting Date' field not found in project $PROJECT_OWNER #$PROJECT_NUMBER. Skipping."
              continue
            fi
            if [ -z "$REPORTING_LOG_FIELD_ID" ]; then
              echo "Error: 'Reporting Log' field not found in project $PROJECT_OWNER #$PROJECT_NUMBER. Skipping."
              continue
            fi

            # Warn if the fields limit may have been hit (silently truncates fields beyond 30)
            FIELD_COUNT=$(echo "$PAGE_RESPONSE" | jq '.data.organization.projectV2.fields.nodes | length')
            if [ "$FIELD_COUNT" -ge 30 ]; then
              echo "Warning: Project returned $FIELD_COUNT fields (query limit: 30). If required fields are missing above, increase the fields(first:) limit in the workflow."
            fi

            echo "Project ID             : $PROJECT_ID"
            echo "Reporting Date field ID: $REPORTING_DATE_FIELD_ID"
            echo "Reporting Log field ID : $REPORTING_LOG_FIELD_ID"
            echo "Alerts field ID        : ${SYNC_STATUS_FIELD_ID:-not configured}"
            echo "External Ref field ID  : ${EXTERNAL_REF_FIELD_ID:-not configured}"
            echo "Area field ID          : ${AREA_FIELD_ID:-not configured}"
            echo "Priority field ID      : ${PRIORITY_FIELD_ID:-not configured}"
            echo "Estimate field ID      : ${ESTIMATE_FIELD_ID:-not configured}"
            echo "Remaining Work field ID: ${REMAINING_WORK_FIELD_ID:-not configured}"
            echo "Time Spent field ID    : ${TIME_SPENT_FIELD_ID:-not configured}"
            echo "Version field ID       : ${VERSION_FIELD_ID:-not configured}"
            echo "Σ Estimate field ID    : ${SIGMA_ESTIMATE_FIELD_ID:-not configured}"
            echo "Σ Remaining field ID   : ${SIGMA_REMAINING_FIELD_ID:-not configured}"
            echo "Σ Time Spent field ID  : ${SIGMA_SPENT_FIELD_ID:-not configured}"

            PAGE=1

            # Phase 1: collect all items across all pages into a temp file
            ITEMS_FILE=$(mktemp)
            echo "$PAGE_RESPONSE" | jq -c '.data.organization.projectV2.items.nodes[]' >> "$ITEMS_FILE"

            # Paginate through any remaining pages
            HAS_NEXT=$(echo "$PAGE_RESPONSE" | jq -r '.data.organization.projectV2.items.pageInfo.hasNextPage')
            CURSOR=$(echo "$PAGE_RESPONSE"   | jq -r '.data.organization.projectV2.items.pageInfo.endCursor')

            while [ "$HAS_NEXT" = "true" ]; do
              PAGE=$((PAGE + 1))
              echo ""
              echo "Fetching page $PAGE (cursor: $CURSOR)..."

              PAGE_RESPONSE=$(gh api graphql -f query='
                query($owner: String!, $number: Int!, $cursor: String!) {
                  organization(login: $owner) {
                    projectV2(number: $number) {
                      items(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          isArchived
                          content {
                            ... on Issue {
                              number
                              title
                              url
                              assignees(first: 5) { nodes { login } }
                              subIssues(first: 50) { nodes { number } }
                            }
                            ... on PullRequest {
                              number
                              title
                              url
                              assignees(first: 5) { nodes { login } }
                            }
                          }
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldTextValue {
                                text
                                field { ... on ProjectV2Field { name } }
                              }
                              ... on ProjectV2ItemFieldNumberValue {
                                number
                                field { ... on ProjectV2Field { name } }
                              }
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                                field { ... on ProjectV2SingleSelectField { name } }
                              }
                              ... on ProjectV2ItemFieldDateValue {
                                date
                                field { ... on ProjectV2Field { name } }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              ' -f owner="$PROJECT_OWNER" -F number=$PROJECT_NUMBER -f cursor="$CURSOR")

              GRAPHQL_ERRORS=$(echo "$PAGE_RESPONSE" | jq -r '.errors // empty')
              if [ -n "$GRAPHQL_ERRORS" ]; then
                echo "Error: GraphQL pagination query failed on page $PAGE:"
                echo "$GRAPHQL_ERRORS"
                record_error "${PROJECT_OWNER}:${PROJECT_NUMBER}" "GraphQL pagination error on page $PAGE: $GRAPHQL_ERRORS"
                break
              fi

              echo "$PAGE_RESPONSE" | jq -c '.data.organization.projectV2.items.nodes[]' >> "$ITEMS_FILE"

              HAS_NEXT=$(echo "$PAGE_RESPONSE" | jq -r '.data.organization.projectV2.items.pageInfo.hasNextPage')
              CURSOR=$(echo "$PAGE_RESPONSE"   | jq -r '.data.organization.projectV2.items.pageInfo.endCursor')
            done

            # Phase 2: build issue→status map for CHILDREN_STATUS checks
            unset ISSUE_STATUS
            declare -A ISSUE_STATUS
            while IFS= read -r item; do
              num=$(echo "$item" | jq -r '.content.number // ""')
              [ -z "$num" ] && continue
              ISSUE_STATUS["$num"]=$(get_field "$item" "Status")
            done < "$ITEMS_FILE"

            # Phase 3: process all items
            UPDATED_COUNT=0
            SKIPPED_COUNT=0
            process_items < "$ITEMS_FILE"
            
            # Phase 4: Calculate Σ (sigma) aggregated fields for parent issues
            # Only run if all three Σ fields exist in the project
            if [ -n "$SIGMA_ESTIMATE_FIELD_ID" ] && [ -n "$SIGMA_REMAINING_FIELD_ID" ] && [ -n "$SIGMA_SPENT_FIELD_ID" ]; then
              echo ""
              echo "========================================"
              echo "Calculating Σ aggregated fields for parent issues..."
              echo "========================================"
              
              SIGMA_UPDATED_COUNT=0
              SIGMA_SKIPPED_COUNT=0
              
              # Build a map of issue number to item data for quick lookup
              declare -A ISSUE_ITEM_ID
              declare -A ISSUE_ESTIMATE
              declare -A ISSUE_REMAINING
              declare -A ISSUE_SPENT
              declare -A ISSUE_TITLE
              
              while IFS= read -r item; do
                num=$(echo "$item" | jq -r '.content.number // ""')
                [ -z "$num" ] && continue
                
                ISSUE_ITEM_ID["$num"]=$(echo "$item" | jq -r '.id')
                ISSUE_ESTIMATE["$num"]=$(get_field "$item" "Estimate")
                ISSUE_REMAINING["$num"]=$(get_field "$item" "Remaining Work")
                ISSUE_SPENT["$num"]=$(get_field "$item" "Time Spent")
                ISSUE_TITLE["$num"]=$(echo "$item" | jq -r '.content.title // ""')
              done < "$ITEMS_FILE"
              
              # Function to recursively get all descendant sub-issues
              # $1 = issue number, $2 = current depth, $3 = visited issues (for cycle detection)
              get_all_descendants() {
                local issue_num="$1"
                local depth="$2"
                local visited="$3"
                local max_depth=10
                
                # Check for max depth
                if [ "$depth" -ge "$max_depth" ]; then
                  echo "Warning: Max recursion depth ($max_depth) reached for issue #$issue_num" >&2
                  return
                fi
                
                # Check for circular dependency
                if echo "$visited" | grep -q "|$issue_num|"; then
                  echo "Error: Circular dependency detected involving issue #$issue_num" >&2
                  record_error "${PROJECT_OWNER}:${PROJECT_NUMBER}" "Circular dependency detected in issue #$issue_num"
                  return
                fi
                
                # Add current issue to visited list
                visited="${visited}|${issue_num}|"
                
                # Query sub-issues for this issue
                local sub_issues=$(gh api graphql -f query='
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $number) {
                        trackedInIssues(first: 100) {
                          nodes { number }
                        }
                      }
                    }
                  }
                ' -f owner="$PROJECT_OWNER" -f repo="${REPO_NAME:-$(echo "$PROJECT_OWNER" | tr '[:upper:]' '[:lower:]')}" -F number="$issue_num" 2>/dev/null | \
                  jq -r '.data.repository.issue.trackedInIssues.nodes[]?.number // empty' 2>/dev/null || echo "")
                
                # Output direct sub-issues
                for sub in $sub_issues; do
                  echo "$sub"
                  # Recursively get descendants of this sub-issue
                  get_all_descendants "$sub" $((depth + 1)) "$visited"
                done
              }
              
              # Process each item to find parent issues (those with sub-issues)
              while IFS= read -r item; do
                ITEM_ID=$(echo "$item" | jq -r '.id')
                ISSUE_NUMBER=$(echo "$item" | jq -r '.content.number // ""')
                ISSUE_TITLE_VAL=$(echo "$item" | jq -r '.content.title // ""')
                
                # Skip if not a GitHub issue
                [ -z "$ISSUE_NUMBER" ] && continue
                
                # Get direct sub-issues from the item data
                SUB_ISSUES=$(echo "$item" | jq -r '.content.subIssues.nodes[]?.number // empty' 2>/dev/null || echo "")
                
                # Skip if no sub-issues (not a parent)
                [ -z "$SUB_ISSUES" ] && continue
                
                echo ""
                echo "Processing parent issue #$ISSUE_NUMBER: $ISSUE_TITLE_VAL"
                
                # Get all descendants recursively
                ALL_DESCENDANTS=$(get_all_descendants "$ISSUE_NUMBER" 0 "")
                
                # Skip if no descendants found (shouldn't happen, but be safe)
                if [ -z "$ALL_DESCENDANTS" ]; then
                  echo "  → No descendants found, skipping"
                  SIGMA_SKIPPED_COUNT=$((SIGMA_SKIPPED_COUNT + 1))
                  continue
                fi
                
                # Calculate Σ values: parent's value + sum of all descendants
                PARENT_ESTIMATE=${ISSUE_ESTIMATE["$ISSUE_NUMBER"]:-0}
                PARENT_REMAINING=${ISSUE_REMAINING["$ISSUE_NUMBER"]:-0}
                PARENT_SPENT=${ISSUE_SPENT["$ISSUE_NUMBER"]:-0}
                
                # Convert empty strings to 0
                [ -z "$PARENT_ESTIMATE" ] && PARENT_ESTIMATE=0
                [ -z "$PARENT_REMAINING" ] && PARENT_REMAINING=0
                [ -z "$PARENT_SPENT" ] && PARENT_SPENT=0
                
                SIGMA_EST="$PARENT_ESTIMATE"
                SIGMA_REM="$PARENT_REMAINING"
                SIGMA_SP="$PARENT_SPENT"
                
                DESCENDANT_COUNT=0
                for desc in $ALL_DESCENDANTS; do
                  desc_est=${ISSUE_ESTIMATE["$desc"]:-0}
                  desc_rem=${ISSUE_REMAINING["$desc"]:-0}
                  desc_sp=${ISSUE_SPENT["$desc"]:-0}
                  
                  [ -z "$desc_est" ] && desc_est=0
                  [ -z "$desc_rem" ] && desc_rem=0
                  [ -z "$desc_sp" ] && desc_sp=0
                  
                  SIGMA_EST=$(awk "BEGIN {print $SIGMA_EST + $desc_est}")
                  SIGMA_REM=$(awk "BEGIN {print $SIGMA_REM + $desc_rem}")
                  SIGMA_SP=$(awk "BEGIN {print $SIGMA_SP + $desc_sp}")
                  
                  DESCENDANT_COUNT=$((DESCENDANT_COUNT + 1))
                done
                
                echo "  → Found $DESCENDANT_COUNT descendant(s)"
                echo "  → Σ Estimate: $SIGMA_EST, Σ Remaining Work: $SIGMA_REM, Σ Time Spent: $SIGMA_SP"
                
                # Update Σ Estimate field
                gh api graphql -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { number: $value }
                    }) {
                      projectV2Item { id }
                    }
                  }
                ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$SIGMA_ESTIMATE_FIELD_ID" -F value="$SIGMA_EST" >/dev/null
                
                # Update Σ Remaining Work field
                gh api graphql -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { number: $value }
                    }) {
                      projectV2Item { id }
                    }
                  }
                ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$SIGMA_REMAINING_FIELD_ID" -F value="$SIGMA_REM" >/dev/null
                
                # Update Σ Time Spent field
                gh api graphql -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { number: $value }
                    }) {
                      projectV2Item { id }
                    }
                  }
                ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$SIGMA_SPENT_FIELD_ID" -F value="$SIGMA_SP" >/dev/null
                
                SIGMA_UPDATED_COUNT=$((SIGMA_UPDATED_COUNT + 1))
              done < "$ITEMS_FILE"
              
              echo ""
              echo "Σ aggregation summary: $SIGMA_UPDATED_COUNT parent issue(s) updated, $SIGMA_SKIPPED_COUNT skipped."
            else
              echo ""
              echo "Σ aggregated fields not configured in project - skipping aggregation."
            fi
            
            rm -f "$ITEMS_FILE"

            echo ""
            echo "Project summary: $UPDATED_COUNT item(s) updated, $SKIPPED_COUNT item(s) skipped (across $PAGE page(s))."
            TOTAL_UPDATED=$((TOTAL_UPDATED + UPDATED_COUNT))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED_COUNT))
          done

          echo ""
          echo "========================================"
          echo "Total: $TOTAL_UPDATED item(s) updated, $TOTAL_SKIPPED item(s) skipped across all projects."
          echo "========================================"

          # Write error summary to GITHUB_OUTPUT for the notification step
          if [ -s "$WORKFLOW_ERRORS_FILE" ]; then
            ERROR_COUNT=$(wc -l < "$WORKFLOW_ERRORS_FILE")
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
            {
              echo "error_summary<<PSYNC_EOF"
              echo "${ERROR_COUNT} error(s) detected:"
              cat "$WORKFLOW_ERRORS_FILE"
              echo "PSYNC_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

          # Write alerts summary to GITHUB_OUTPUT for the assignee notification step
          if [ -s "$WORKFLOW_ALERTS_FILE" ]; then
            ALERT_COUNT=$(wc -l < "$WORKFLOW_ALERTS_FILE")
            echo "has_alerts=true" >> "$GITHUB_OUTPUT"
            {
              echo "alerts_summary<<PSYNC_ALERTS_EOF"
              cat "$WORKFLOW_ALERTS_FILE"
              echo "PSYNC_ALERTS_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update error issue
        if: always() && steps.sync.outputs.has_errors == 'true'
        env:
          GH_TOKEN: ${{ secrets.PSYNC_PAT_GH }}
          ERROR_SUMMARY: ${{ steps.sync.outputs.error_summary }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          printf '%s\n\nWorkflow run: %s\n' "$ERROR_SUMMARY" "$RUN_URL" > /tmp/psync_error_body.txt

          # Ensure the label exists (no-op if already present)
          gh label create "psync-error" --color "d73a4a" --description "Sync workflow error" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          OPEN_ISSUE=$(gh issue list --repo "${{ github.repository }}" --state open \
            --label "psync-error" --json number --jq '.[0].number // ""')

          if [ -n "$OPEN_ISSUE" ]; then
            gh issue comment "$OPEN_ISSUE" --repo "${{ github.repository }}" --body-file /tmp/psync_error_body.txt
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "bug: Github project(s) sync workflow error" \
              --label "psync-error" \
              --body-file /tmp/psync_error_body.txt
          fi

      - name: Close error issue on clean run
        if: always() && steps.sync.outputs.has_errors == 'false'
        env:
          GH_TOKEN: ${{ secrets.PSYNC_PAT_GH }}
        run: |
          OPEN_ISSUE=$(gh issue list --repo "${{ github.repository }}" --state open \
            --label "psync-error" --json number --jq '.[0].number // ""')

          if [ -n "$OPEN_ISSUE" ]; then
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            gh issue comment "$OPEN_ISSUE" --repo "${{ github.repository }}" \
              --body "Sync run completed without errors. Closing. Run: $RUN_URL"
            gh issue close "$OPEN_ISSUE" --repo "${{ github.repository }}"
          fi

      - name: Open or update alert notification issue
        if: always() && steps.sync.outputs.has_alerts == 'true'
        env:
          GH_TOKEN: ${{ secrets.PSYNC_PAT_GH }}
          ALERTS_DATA: ${{ steps.sync.outputs.alerts_summary }}
        run: |
          set -e
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Ensure the label exists
          gh label create "alerts-notification" --color "fbca04" \
            --description "Validation alerts notification" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          # Parse alerts data and group by assignee
          # Format: project_owner:project_number|issue_number|assignees|alerts|title
          echo "$ALERTS_DATA" > /tmp/alerts_data.txt

          # Count total issues and projects
          TOTAL_ISSUES=$(wc -l < /tmp/alerts_data.txt)
          TOTAL_PROJECTS=$(cut -d'|' -f1 /tmp/alerts_data.txt | sort -u | wc -l)

          # Build project summary
          PROJECT_SUMMARY=""
          for project in $(cut -d'|' -f1 /tmp/alerts_data.txt | sort -u); do
            PROJECT_COUNT=$(grep -c "^${project}|" /tmp/alerts_data.txt)
            PROJECT_SUMMARY="${PROJECT_SUMMARY}- **${project}** - ${PROJECT_COUNT} issue(s) with alerts"$'\n'
          done

          # Build issue body
          ISSUE_BODY="# 🚨 GitHub Projects Alerts Notification

          This issue tracks validation alerts across all monitored projects.
          The issue will automatically close when all alerts are resolved.

          **Last updated:** ${TIMESTAMP}
          **Workflow run:** ${RUN_URL}
          **Total alerts:** ${TOTAL_ISSUES} issue(s) across ${TOTAL_PROJECTS} project(s)

          ## Summary by Project

          ${PROJECT_SUMMARY}
          Assignees are mentioned in comments below with detailed alert information."

          # Find or create the alert notification issue
          ALERT_ISSUE=$(gh issue list --repo "${{ github.repository }}" --state open \
            --label "alerts-notification" --json number --jq '.[0].number // ""')

          if [ -z "$ALERT_ISSUE" ]; then
            echo "Creating new alert notification issue..."
            ISSUE_URL=$(gh issue create --repo "${{ github.repository }}" \
              --title "🚨 GitHub Projects Alerts Notification" \
              --label "alerts-notification" \
              --body "$ISSUE_BODY")
            ALERT_ISSUE=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
            echo "Created issue #${ALERT_ISSUE} at ${ISSUE_URL}"
          else
            echo "Updating existing alert notification issue #${ALERT_ISSUE}..."
            gh issue edit "$ALERT_ISSUE" --repo "${{ github.repository }}" --body "$ISSUE_BODY"
          fi

          # Group alerts by assignee
          declare -A ASSIGNEE_ALERTS
          while IFS='|' read -r project issue_num assignees alerts title; do
            # Split comma-separated assignees
            IFS=',' read -ra ASSIGNEE_ARRAY <<< "$assignees"
            for assignee in "${ASSIGNEE_ARRAY[@]}"; do
              assignee=$(echo "$assignee" | xargs)  # trim whitespace
              if [ -z "${ASSIGNEE_ALERTS[$assignee]}" ]; then
                ASSIGNEE_ALERTS[$assignee]="**Project ${project}**"$'\n'"- Issue #${issue_num} \"${title}\": ${alerts}"
              else
                # Check if we need to add a new project header
                if ! echo "${ASSIGNEE_ALERTS[$assignee]}" | grep -q "**Project ${project}**"; then
                  ASSIGNEE_ALERTS[$assignee]="${ASSIGNEE_ALERTS[$assignee]}"$'\n\n'"**Project ${project}**"$'\n'"- Issue #${issue_num} \"${title}\": ${alerts}"
                else
                  ASSIGNEE_ALERTS[$assignee]="${ASSIGNEE_ALERTS[$assignee]}"$'\n'"- Issue #${issue_num} \"${title}\": ${alerts}"
                fi
              fi
            done
          done < /tmp/alerts_data.txt

          # Post comments for each assignee
          for assignee in "${!ASSIGNEE_ALERTS[@]}"; do
            COMMENT_BODY="@${assignee} You have validation alerts:

          ${ASSIGNEE_ALERTS[$assignee]}

          Please review and resolve these alerts."

            echo "Posting comment for @${assignee}..."
            gh issue comment "$ALERT_ISSUE" --repo "${{ github.repository }}" --body "$COMMENT_BODY"
          done

          rm -f /tmp/alerts_data.txt
          echo "Alert notification issue updated successfully."

      - name: Close alert notification issue on clean run
        if: always() && steps.sync.outputs.has_alerts == 'false'
        env:
          GH_TOKEN: ${{ secrets.PSYNC_PAT_GH }}
        run: |
          ALERT_ISSUE=$(gh issue list --repo "${{ github.repository }}" --state open \
            --label "alerts-notification" --json number --jq '.[0].number // ""')

          if [ -n "$ALERT_ISSUE" ]; then
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            gh issue comment "$ALERT_ISSUE" --repo "${{ github.repository }}" \
              --body "All validation alerts have been resolved. Closing. Run: $RUN_URL"
            gh issue close "$ALERT_ISSUE" --repo "${{ github.repository }}"
            echo "Closed alert notification issue #${ALERT_ISSUE}"
          fi
